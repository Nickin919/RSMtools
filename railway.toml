# Railway deployment config
# https://docs.railway.app/reference/config-as-code

[build]
builder = "dockerfile"

[deploy]
# Run migrations then start server (pre-deploy often can't reach DB; start command runs in app container)
startCommand = "/bin/sh -c \"npx prisma db push --accept-data-loss && npx prisma db seed && node dist/server.js\""
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
